spring.application.name=CampusRun Backend

# ?? Server Configuration ????????????????????????????????????????????????????
# Bind to all interfaces so Android emulator (10.0.2.2) and physical devices
# on the same network can reach the backend. Override PORT via environment variable.
server.port=${PORT:8080}
server.address=0.0.0.0

# ?? Database Configuration ?????????????????????????????????????????????????
# Override via environment variables in production:
#   DB_URL=jdbc:postgresql://<host>:5432/campusrun
#   DB_USERNAME=<your_db_user>
#   DB_PASSWORD=<your_db_password>
spring.datasource.url=${DB_URL:jdbc:postgresql://dpg-d807p31j2pic73f3avb0-a.oregon-postgres.render.com/campusrun_db?sslmode=require}
spring.datasource.username=${DB_USERNAME:campusrun}
spring.datasource.password=${DB_PASSWORD:6jlFHSHBhgICUTjktZgi92b42ncK3Fmr}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ?? JPA / Hibernate ????????????????????????????????????????????????????????
# Use 'validate' in production after schema is stable; 'update' for development
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Prevent lazy-loading issues when serializing entities
spring.jpa.open-in-view=false

# ?? JWT Configuration ??????????????????????????????????????????????????????
# Override via environment variable in production:
#   JWT_SECRET=<your_256bit_or_larger_hex_secret>
#   JWT_EXPIRATION=86400000 (24 hours in milliseconds)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:604800000}

# ?? CORS Allowed Origins ???????????????????????????????????????????????????
# In production, restrict this to your frontend domain(s).
# For development: * allows Android emulator (10.0.2.2), physical devices, and web clients.
# app.cors.allowed-origins=${CORS_ORIGINS:*}

# ?? File Storage ???????????????????????????????????????????????????????????
# Directory for uploaded files (CVs, proofs). Override in production.
app.upload.dir=${UPLOAD_DIR:uploads}

# Increase max upload size for provider document uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB


# ?? Logging ????????????????????????????????????????????????????????????????
logging.level.root=INFO
logging.level.com.example.campusrunbackend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ?? Jackson ???????????????????????????????????????????????????????????????
# Prevent serialization errors for NULL properties and Java 8 date types
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
